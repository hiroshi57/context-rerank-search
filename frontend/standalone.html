<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文脈類似検索</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
  <style>
    body{font-family:system-ui,sans-serif;background:#f7f8fa;margin:0;padding:24px;color:#1a1a2e}
    .wrap{max-width:760px;margin:0 auto} h1{color:#5a3fb8;font-size:22px}
    .card{background:#fff;border-radius:12px;padding:16px;margin:12px 0;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    table{border-collapse:collapse;width:100%} th,td{border:1px solid #dde;padding:6px 8px} th{background:#efeafb}
    .reasons{color:#5a3fb8;font-size:13px} .snippet{color:#667;font-size:13px}
    nav button{margin-right:8px} li{margin:8px 0}
  
    /* --- レスポンシブ強化(スマホ最適化) --- */
    *{box-sizing:border-box} img,pre,table{max-width:100%}
    .metrics{flex-wrap:wrap}
    @media (max-width:640px){
      body{padding:14px} .wrap{max-width:100%}
      h1{font-size:19px} nav button{margin-bottom:6px}
      .metrics{flex-direction:column;gap:8px} .metric{width:100%}
      table{display:block;overflow-x:auto;white-space:nowrap;font-size:13px}
      pre{overflow-x:auto} input,textarea,select{max-width:100%;width:100%}
    }
</style>
</head>
<body><div style="max-width:880px;margin:0 auto 4px;background:#fff8e1;border:1px solid #f0d98a;border-radius:10px;padding:8px 14px;font:13px system-ui;color:#7a5b00">🔬 <b>デモ版</b>：数値は<b>サンプル（実測・実データではありません）</b>。ロジックの見せ方を確認するためのプロトタイプです。</div>
<div id="root"></div>
<script type="text/plain" id="__jsx">
  const RESULTS=[{doc_id:"saas",rerank_score:0.31,reasons:["同義概念で一致(キャンセル→解約)"],snippet:"…30日前の通知で解約…"},
    {doc_id:"gyoumu",rerank_score:0.28,reasons:["同義概念で一致(中途解約)"],snippet:"…1ヶ月前の予告で中途解約…"}];
  const EVAL={vector_only:{"recall@3":1.0,"precision@3":0.47,MRR:0.9,"nDCG@3":0.939},
    with_rerank:{"recall@3":1.0,"precision@3":0.53,MRR:1.0,"nDCG@3":0.984}};
  function App(){
    const [tab,setTab]=React.useState("search");
    return (<div className="wrap"><h1>文脈類似ドキュメント検索 <small style={{fontSize:12,color:"#889"}}>(デモ)</small></h1>
      <nav><button onClick={()=>setTab("search")} disabled={tab==="search"}>検索</button>
        <button onClick={()=>setTab("eval")} disabled={tab==="eval"}>精度評価</button></nav>
      {tab==="search"?(<div className="card"><h2>文脈類似検索</h2>
        <input style={{width:"100%"}} defaultValue="契約をキャンセルしたい"/>
        <ul>{RESULTS.map((r,i)=>(<li key={i}><b>{r.doc_id}</b>（score {r.rerank_score}）
          <div className="reasons">{r.reasons.join(" / ")}</div><div className="snippet">{r.snippet}</div></li>))}</ul>
      </div>):(<div className="card"><h2>精度評価(vector-only vs +rerank)</h2>
        <table><tr><th>パイプライン</th><th>recall@3</th><th>precision@3</th><th>MRR</th><th>nDCG@3</th></tr>
          {Object.entries(EVAL).map(([n,m])=>(<tr key={n}><td>{n}</td><td>{m["recall@3"]}</td>
            <td>{m["precision@3"]}</td><td>{m.MRR}</td><td>{m["nDCG@3"]}</td></tr>))}</table></div>)}</div>);
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script><script>(function(){var src=document.getElementById("__jsx").textContent;var out=Babel.transform(src,{presets:[["react",{runtime:"classic"}]]}).code;(0,eval)(out);})();</script></body></html>
